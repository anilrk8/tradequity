services:
  - type: web
    name: tradequity
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: DB_PATH
        value: /data/stocks.db
      - key: PYTHON_VERSION
        value: 3.10.16
    disk:
      name: tradequity-data
      mountPath: /data
      sizeGB: 5
